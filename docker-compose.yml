version: '3.9'

services:
  mongo:
    image: mongo:latest
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

  server:
    build:
      context: ./server
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      MONGO_URI: mongodb://mongo:27017/miniblog
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      - mongo

  client:
    build:
      context: ./client
      args:
        VITE_API_BASE_URL: http://localhost:5000/api
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      - server

volumes:
  mongo-data:
